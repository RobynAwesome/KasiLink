name: CI

on:
  push:
    branches: [main, recovery-local-2026-04-06]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm run test:vitest

      - name: Build
        run: npm run build
        env:
          # Stub env vars so Next.js build doesn't fail
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          CLERK_SECRET_KEY: sk_test_stub
          MONGODB_URI: mongodb://localhost:27017/stub
          CLERK_WEBHOOK_SECRET: whsec_stub
